UI menu.c32
PROMPT 0

MENU TITLE Pochota Web Live
TIMEOUT 50

DEFAULT archiso

LABEL archiso
    MENU LABEL Pochota Web Live (x86_64)
    LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
    INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL%

LABEL archiso_x32
    MENU LABEL Pochota Web Live (x86_64 with x32 init)
    LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
    INITRD ../%INSTALL_DIR%/boot/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL%

LABEL memtest
    MENU LABEL Memtest86+ (BIOS)
    LINUX ../%INSTALL_DIR%/boot/memtest86+/memtest.bin

LABEL hdt
    MENU LABEL HDT (Hardware Info)
    COM32 hdt.c32

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32
