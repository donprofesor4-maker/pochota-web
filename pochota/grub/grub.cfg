set default="0"
set gfxmode=auto
set gfxpayload=keep
loadfont /usr/share/grub/unicode.pf2
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod part_gpt
insmod ext2
insmod chain

set theme=/boot/grub/themes/archlinux/theme.txt

if [ "${grub_platform}" == "efi" ]; then
  insmod efi_gop
  insmod efi_uga
fi

# Use a proper background image if available
if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=white/dark-gray
else
  set menu_color_normal=cyan/blue
  set menu_color_highlight=white/blue
fi

menuentry "Pochota Web Live (x86_64)" {
  linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL%
  initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "Pochota Web Live (x86_64 - Fallback)" {
  linux /%INSTALL_DIR%/boot/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL%
  initrd /%INSTALL_DIR%/boot/initramfs-linux.img
}

menuentry "Reboot" {
  reboot
}

menuentry "Power Off" {
  halt
}
